spring.application.name=clients
server.port=8080

# Use the project folder as the Excel root so the app works on any machine.
app.dossier.racine=${user.dir}

# The application reads Excel files only, so disable database auto-configuration.
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration